<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .joke-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.3em;
            line-height: 1.6;
            font-weight: 500;
        }

        .joke-text {
            margin-bottom: 15px;
        }

        .joke-punchline {
            margin-top: 15px;
            font-style: italic;
            opacity: 0.9;
            display: none;
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .joke-type {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            color: #666;
            font-size: 0.9em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            color: #667eea;
            font-size: 0.9em;
            margin-top: 10px;
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2em;
            }

            .joke-display {
                font-size: 1.1em;
                padding: 20px;
                min-height: 100px;
            }

            .button-group {
                gap: 10px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <p class="subtitle">Get a random laugh!</p>

        <div class="error" id="errorMessage"></div>

        <div class="joke-display">
            <div class="loader" id="loader"></div>
            <div class="joke-text" id="jokeText">Click "Get Joke" to start!</div>
            <div class="joke-punchline" id="jokeAnswer"></div>
        </div>

        <div class="joke-type" id="jokeType"></div>

        <div class="button-group">
            <button class="btn-primary" onclick="getJoke()">Get Joke</button>
            <button class="btn-secondary" onclick="togglePunchline()">Show Punchline</button>
            <button class="btn-secondary" onclick="copyJoke()">Copy</button>
        </div>

        <p class="success-message" id="successMessage">Copied to clipboard!</p>
    </div>

    <script>
        let currentJoke = null;
        let currentType = null;
        let showingAnswer = false;

        async function getJoke() {
            const loader = document.getElementById('loader');
            const jokeText = document.getElementById('jokeText');
            const jokeAnswer = document.getElementById('jokeAnswer');
            const errorMessage = document.getElementById('errorMessage');
            const jokeTypeDiv = document.getElementById('jokeType');

            // Reset state
            loader.style.display = 'block';
            jokeText.textContent = '';
            jokeAnswer.textContent = '';
            jokeAnswer.style.display = 'none';
            errorMessage.style.display = 'none';
            showingAnswer = false;

            try {
                // Using Jokes API (https://v2.jokeapi.dev/)
                const response = await fetch('https://v2.jokeapi.dev/joke/Any?format=json');

                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();
                loader.style.display = 'none';

                if (data.type === 'single') {
                    // Single part joke
                    currentJoke = data.joke;
                    currentType = data.category;
                    jokeText.textContent = data.joke;
                    jokeAnswer.style.display = 'none';
                    jokeTypeDiv.textContent = `Category: ${data.category} | Type: Single`;
                } else if (data.type === 'twopart') {
                    // Two part joke (setup + delivery)
                    currentJoke = data.setup;
                    currentType = data.category;
                    jokeText.textContent = data.setup;
                    jokeAnswer.textContent = data.delivery;
                    jokeAnswer.style.display = 'none';
                    jokeTypeDiv.textContent = `Category: ${data.category} | Type: Two-Part`;
                }
            } catch (error) {
                loader.style.display = 'none';
                errorMessage.textContent = `Error: ${error.message}. Please try again.`;
                errorMessage.style.display = 'block';
                console.error('Error fetching joke:', error);
            }
        }

        function togglePunchline() {
            const jokeAnswer = document.getElementById('jokeAnswer');
            if (jokeAnswer.textContent === '') return;

            if (showingAnswer) {
                jokeAnswer.style.display = 'none';
                showingAnswer = false;
            } else {
                jokeAnswer.style.display = 'block';
                showingAnswer = true;
            }
        }

        function copyJoke() {
            const jokeText = document.getElementById('jokeText').textContent;
            const jokeAnswer = document.getElementById('jokeAnswer').textContent;
            const fullJoke = jokeAnswer ? `${jokeText}\n\n${jokeAnswer}` : jokeText;

            navigator.clipboard.writeText(fullJoke).then(() => {
                const successMessage = document.getElementById('successMessage');
                successMessage.style.display = 'block';
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 2000);
            }).catch(error => {
                console.error('Error copying to clipboard:', error);
            });
        }

        // Load a joke on page load
        window.addEventListener('load', getJoke);
    </script>
</body>
</html>
